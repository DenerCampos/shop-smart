name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm_main_deploy:
        description: 'Redeploy na VPS a partir de origin/main (produção). O servidor sempre faz checkout/pull de main.'
        type: boolean
        required: true
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Exigir confirmação no disparo manual
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_main_deploy != 'true'
        run: |
          echo "::error::Marque \"confirm_main_deploy\" para redeploy manual. A VPS sempre usa origin/main."
          exit 1

      - uses: actions/checkout@v4
        with:
          # Push: commit exato. Manual: main (mesmo ref que o SSH puxa na VPS).
          ref: ${{ github.event_name != 'workflow_dispatch' && github.sha || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci
      - run: npm run test:ci

  deploy:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: DEPLOY_REMOTE_DIR
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail
            if [ -z "${DEPLOY_REMOTE_DIR:-}" ]; then
              echo "DEPLOY_REMOTE_DIR não definido (secret no GitHub)." >&2
              exit 1
            fi
            cd "$DEPLOY_REMOTE_DIR"
            # Atualiza a partir da main (inclui ci_deploy.sh após o primeiro merge que o trouxe)
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            if [ ! -f "./ci_deploy.sh" ]; then
              echo "ci_deploy.sh não encontrado em $(pwd). Confira DEPLOY_REMOTE_DIR (raiz do clone)." >&2
              ls -la >&2
              exit 1
            fi
            bash ./ci_deploy.sh
