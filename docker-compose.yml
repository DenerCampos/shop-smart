version: '3'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT}:3000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - shop_smart
    restart: always
    volumes:
      - ./logs:/usr/src/app/logs
      - /etc/localtime:/etc/localtime:ro # Sincroniza o relógio com a VPS Linux
      - /etc/timezone:/etc/timezone:ro

  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${API_DB_ROOT_PASS}
      MYSQL_DATABASE: ${API_DB_NAME}
      MYSQL_USER: ${API_DB_USER}
      MYSQL_PASSWORD: ${API_DB_PASS}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DEFAULT_AUTHENTICATION_PLUGIN: mysql_native_password
      TZ: America/Sao_Paulo # Faz o MySQL registrar os Timestamps corretamente
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --authentication-policy=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-config/my.cnf:/etc/mysql/conf.d/custom.cnf 
      - /etc/localtime:/etc/localtime:ro # Sincroniza o relógio com a VPS Linux
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "${API_DB_PORT}:3306"
    networks:
      - shop_smart
    restart: always

  redis:
    image: redis:7.2.4
    environment:
      - TZ=America/Sao_Paulo # Opcional, para consistência no Redis
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - shop_smart
    restart: always

  backup:
    image: mysql:8.0-oracle
    depends_on:
      - db
    volumes:
      - /opt/shop_smart/backups:/backups
      - ./scripts:/scripts
      - /etc/localtime:/etc/localtime:ro # Sincroniza também no backup
    environment:
      MYSQL_DATABASE: ${API_DB_NAME}
      MYSQL_USER: ${API_DB_USER}
      MYSQL_PASSWORD: ${API_DB_PASS}
      MYSQL_HOST: ${API_DB_HOST}
      MYSQL_PORT: ${API_DB_PORT}
      TZ: America/Sao_Paulo
    networks:
      - shop_smart
    command: >
      bash -c "
        chmod +x /scripts/*.sh &&
        if [ -n \"$$MANUAL\" ]; then
          /scripts/manual_backup_db.sh \"$$@\"
        else
          /scripts/backup_db.sh
        fi
      "

networks:
  shop_smart:

volumes:
  db_data:
