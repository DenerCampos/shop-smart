version: '3'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    depends_on:
      - db
      - redis
    command: sh -c "npm run migration:run && npm run start:dev"
    networks:
      - shop_smart
  db:
    image: mysql:latest
    ports:
      - '3308:3306'
    environment:
      MYSQL_ROOT_PASSWORD: r00t
      MYSQL_DATABASE: shop_smart
      MYSQL_USER: shop_smart
      MYSQL_PASSWORD: shop_smart
    networks:
      - shop_smart
  redis:
    image: redis:latest
    ports:
      - '6380:6379'
    networks:
      - shop_smart

networks:
  shop_smart:
