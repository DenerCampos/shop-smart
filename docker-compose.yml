version: '3'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT}:3000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - shop_smart
    restart: always
    volumes:
      - ./logs:/usr/src/app/logs

  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${API_DB_ROOT_PASS}
      MYSQL_DATABASE: ${API_DB_NAME}
      MYSQL_USER: ${API_DB_USER}
      MYSQL_PASSWORD: ${API_DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-config/my.cnf:/etc/mysql/conf.d/custom.cnf 
    ports:
      - "${API_DB_PORT}:3306"
    networks:
      - shop_smart
    restart: always

  redis:
    image: redis:7.2.4
    networks:
      - shop_smart
    restart: always

  backup:
    image: alpine:latest
    depends_on:
      - db
    volumes:
      - /opt/shop_smart/backups:/backups
      - ./scripts:/scripts
    environment:
      MYSQL_ROOT_PASSWORD: ${API_DB_ROOT_PASS}
      MYSQL_DATABASE: ${API_DB_NAME}
      MYSQL_USER: ${API_DB_USER}
      MYSQL_PASSWORD: ${API_DB_PASS}
    networks:
      - shop_smart
    entrypoint: ["sh", "/scripts/backup.sh"]

networks:
  shop_smart:

volumes:
  db_data:
